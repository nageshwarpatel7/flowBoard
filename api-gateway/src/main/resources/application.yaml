server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: AuthFilter
              args:
                excludedPaths: >
                  /api/v1/auth/register,
                  /api/v1/auth/login,
                  /api/v1/auth/refresh,
                  /api/v1/auth/validate,
                  /api/v1/auth/verify-email,
                  /api/v1/auth/resend-verification,
                  /api/v1/auth/reset-password

        - id: workspace-service
          uri: lb://WORKSPACE-SERVICE
          predicates:
            - Path=/api/v1/workspaces/**
          filters:
            - name: AuthFilter
              args:
                excludedPaths: /api/v1/workspaces/public

        - id: board-service
          uri: lb://BOARD-SERVICE
          predicates:
            - Path=/api/v1/boards/**
          filters:
            - name: AuthFilter
              args:
                excludedPaths: /api/v1/boards/public

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: GET, POST, PUT, DELETE, OPTIONS
            allowedHeaders: "*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: qwertyuiopdfasdfghjkklzxcvbnmqwertyuil