server:
  port: 8081

spring:

  application:
    name: auth-service

  datasource:
    url: jdbc:mysql://localhost:3306/flowboard_auth
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

  # Gmail SMTP configuration
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME:none}    # Fixed structure + added fallback
    password: ${GMAIL_PASSWORD:none}    # Fixed structure + added fallback
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

jwt:
  secret: qwertyuiopdfasdfghjkklzxcvbnmqwertyuil
  expiration: 86400000

otp:
  expiry-minutes: 10

logging:
  level:
    org.springframework.mail: DEBUG
    com.sun.mail: DEBUG
    com.flowBoard: INFO

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true